<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Pulse · 热点日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0e;color:#f0ece4;font-family:system-ui,sans-serif;min-height:100vh}
header{background:rgba(12,12,14,.9);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.1)}
h1{font-size:24px;background:linear-gradient(135deg,#f0ece4,#e8b84b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main{padding:24px;max-width:1200px;margin:0 auto}
.news-item{background:#16161a;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:16px;margin-bottom:12px}
.news-title{font-size:16px;margin-bottom:8px}
.news-meta{font-size:12px;color:#8a8a9a}
.loading{color:#8a8a9a;text-align:center;padding:40px}
.error{color:#e82127;text-align:center;padding:40px}
</style>
</head>
<body>
<header><h1>Daily Pulse 热点日报</h1></header>
<div class="main" id="news-list">
<div class="loading">加载中...</div>
</div>
<script>
var HN="https://hn.algolia.com/api/v1";
async function loadNews(){
  try{
    var r=await fetch(HN+"/search?tags=story&hitsPerPage=30&numericFilters=points>100");
    var d=await r.json();
    var h='';
    d.hits.forEach(function(s,i){
      var url=s.url||"https://news.ycombinator.com/item?id="+s.objectID;
      var domain=s.url?new URL(s.url).hostname:'news.ycombinator.com';
      h+='<div class="news-item"><div class="news-title"><a href="'+url+'" target="_blank" style="color:inherit;text-decoration:none">'+(i+1)+'. '+s.title+'</a></div><div class="news-meta">⭐ '+s.points+' | 💬 '+s.num_comments+' | '+domain+'</div></div>';
    });
    document.getElementById('news-list').innerHTML=h;
  }catch(e){
    document.getElementById('news-list').innerHTML='<div class="error">加载失败: '+e.message+'</div>';
  }
}
loadNews();
</script>
</body>
</html>
