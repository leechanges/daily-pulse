<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Pulse · 热点日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b;
  --bg-secondary:#111113;
  --bg-tertiary:#18181b;
  --card:#1c1c1f;
  --card-hover:#242428;
  --border:#27272a;
  --border-light:#3f3f46;
  --text:#fafafa;
  --text-secondary:#a1a1aa;
  --text-muted:#71717a;
  --accent:#f59e0b;
  --accent-hover:#fbbf24;
  --accent-bg:rgba(245,158,11,0.1);
  --blue:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
  --purple:#a855f7;
  --pink:#ec4899;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;line-height:1.6}
a{color:inherit;text-decoration:none}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,11,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1400px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#f97316);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.logo-text{font-size:20px;font-weight:600;letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}
.header-nav{display:flex;gap:8px}
.nav-btn{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-secondary);background:transparent;border:none;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{color:var(--text);background:var(--card)}
.nav-btn.active{color:var(--accent);background:var(--accent-bg)}
.header-right{display:flex;align-items:center;gap:16px}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.last-update{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}

/* Main */
main{max-width:1400px;margin:0 auto;padding:32px 24px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.2s}
.stat-card:hover{border-color:var(--border-light);transform:translateY(-2px)}
.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700}
.stat-card.orange .stat-value{color:var(--accent)}
.stat-card.blue .stat-value{color:var(--blue)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.purple .stat-value{color:var(--purple)}

/* Category Tabs */
.category-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-tab{padding:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.cat-tab:hover{border-color:var(--border-light);color:var(--text)}
.cat-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.cat-tab .icon{font-size:16px}
.cat-tab .count{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.cat-tab.active .count{color:rgba(0,0,0,0.5)}

/* News Grid */
.news-section{margin-bottom:40px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:20px;background:var(--accent);border-radius:2px}
.refresh-btn{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{color:var(--text);border-color:var(--border-light)}
.refresh-btn.loading{opacity:0.7;pointer-events:none}
.refresh-btn svg{transition:transform 0.3s}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.2s;cursor:pointer;display:flex;flex-direction:column;gap:12px}
.news-card:hover{border-color:var(--border-light);transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.news-rank{font-size:12px;font-weight:600;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.news-title{font-size:15px;font-weight:500;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-domain{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.news-domain .favicon{width:14px;height:14px;border-radius:3px;background:var(--bg-tertiary)}
.news-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-secondary);margin-top:auto}
.news-meta span{display:flex;align-items:center;gap:4px}
.news-meta .score{color:var(--accent)}
.news-meta .comments{color:var(--blue)}
.news-meta .time{color:var(--text-muted)}
.news-card.featured{grid-column:span 2;background:linear-gradient(135deg,var(--card),var(--bg-tertiary));border-color:var(--accent)}
.news-card.featured .news-title{font-size:18px}

/* Hero Section */
.hero-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:40px}
.hero-main{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;min-height:280px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.hero-main:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.hero-main::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#f97316)}
.hero-badge{position:absolute;top:20px;right:20px;padding:4px 12px;background:var(--accent);color:#000;font-size:11px;font-weight:700;border-radius:6px;text-transform:uppercase}
.hero-main .rank{font-size:48px;font-weight:700;color:var(--text-muted);opacity:0.3;position:absolute;top:20px;left:28px}
.hero-main .title{font-size:22px;font-weight:600;line-height:1.4;margin-top:40px;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-main .domain{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.hero-main .meta{display:flex;gap:20px;font-size:13px;color:var(--text-secondary)}
.hero-main .meta .score{color:var(--accent);font-weight:600}

.hero-side{display:flex;flex-direction:column;gap:12px}
.hero-side-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;display:flex;gap:12px;align-items:center}
.hero-side-item:hover{border-color:var(--border-light);transform:translateX(4px)}
.hero-side-item .rank{font-size:16px;font-weight:700;color:var(--text-muted);width:28px}
.hero-side-item .title{font-size:13px;font-weight:500;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-side-item .score{font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* Footer */
footer{border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--text-muted);font-size:13px}
footer a{color:var(--accent)}

/* Loading */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--bg-tertiary) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.news-card.skeleton{height:180px}
.hero-main.skeleton{height:280px}
.hero-side-item.skeleton{height:60px}

/* Responsive */
@media(max-width:1024px){.news-grid{grid-template-columns:repeat(2,1fr)}.hero-grid{grid-template-columns:1fr}}
@media(max-width:768px){.header-inner{flex-direction:column;gap:16px}.stats-row{grid-template-columns:repeat(2,1fr)}.news-grid{grid-template-columns:1fr}.category-tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px}.cat-tab{white-space:nowrap}}

/* Dark scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
</style>
</head>
<body>
<header>
<div class="header-inner">
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <div class="logo-text">Daily<span>Pulse</span></div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" data-view="top">🔥 Top</button>
    <button class="nav-btn" data-view="new">✨ New</button>
    <button class="nav-btn" data-view="best">⭐ Best</button>
    <button class="nav-btn" data-view="ask">💬 Ask</button>
    <button class="nav-btn" data-view="show">🚀 Show</button>
  </nav>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="live-dot"></div>
      <span style="font-size:13px;color:var(--text-secondary)">Live</span>
    </div>
    <div class="last-update" id="last-update">--:--</div>
  </div>
</div>
</header>

<main>
<div class="stats-row">
  <div class="stat-card orange">
    <div class="stat-label">Total Stories</div>
    <div class="stat-value" id="stat-total">--</div>
  </div>
  <div class="stat-card blue">
    <div class="stat-label">New Today</div>
    <div class="stat-value" id="stat-new">--</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">Active Users</div>
    <div class="stat-value" id="stat-users">--</div>
  </div>
  <div class="stat-card purple">
    <div class="stat-label">Comments</div>
    <div class="stat-value" id="stat-comments">--</div>
  </div>
</div>

<div class="hero-grid" id="hero-section" style="display:none">
  <div class="hero-main" id="hero-main"></div>
  <div class="hero-side" id="hero-side"></div>
</div>

<div class="news-section">
  <div class="section-header">
    <div class="section-title" id="section-title">🔥 Top Stories</div>
    <button class="refresh-btn" id="refresh-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>
  <div class="news-grid" id="news-grid"></div>
</div>
</main>

<footer>
<p>Powered by <a href="https://github.com" target="_blank">GitHub</a> · Data from <a href="https://news.ycombinator.com" target="_blank">Hacker News</a></p>
</footer>

<script>
// Use Firebase HN API with CORS proxy fallback
const HN_API = "https://hacker-news.firebaseio.com/v0";
const HN_BASE = "https://hacker-news.firebaseio.com/v0";
let currentView = "top";
let storiesCache = {};

const VIEW_CONFIG = {
  top: { title: "🔥 Top Stories", key: "topstories", icon: "🔥" },
  new: { title: "✨ New Stories", key: "newstories", icon: "✨" },
  best: { title: "⭐ Best Stories", key: "beststories", icon: "⭐" },
  ask: { title: "💬 Ask HN", key: "askstories", icon: "💬" },
  show: { title: "🚀 Show HN", key: "showstories", icon: "🚀" }
};

function showSkeleton() {
  const grid = document.getElementById("news-grid");
  grid.innerHTML = Array(9).fill(0).map(() => '<div class="news-card skeleton"></div>').join("");
}

function timeAgo(timestamp) {
  const seconds = Math.floor(Date.now() / 1000 - timestamp);
  if (seconds < 60) return seconds + "s ago";
  if (seconds < 3600) return Math.floor(seconds / 60) + "m ago";
  if (seconds < 86400) return Math.floor(seconds / 3600) + "h ago";
  return Math.floor(seconds / 86400) + "d ago";
}

function getDomain(url) {
  try {
    return new URL(url).hostname.replace("www.", "");
  } catch {
    return "news.ycombinator.com";
  }
}

function renderStory(story, rank) {
  if (!story) return "";
  const domain = getDomain(story.url);
  const url = story.url || `https://news.ycombinator.com/item?id=${story.id}`;
  
  return `
    <div class="news-card ${rank === 1 ? 'featured' : ''}" onclick="window.open('${url}', '_blank')">
      <div class="news-rank">#${rank}</div>
      <div class="news-title">${story.title || 'Untitled'}</div>
      <div class="news-domain">
        <span class="favicon"></span>
        ${domain}
      </div>
      <div class="news-meta">
        <span class="score">▲ ${story.score || 0}</span>
        <span class="comments">💬 ${story.descendants || 0}</span>
        <span class="time">${timeAgo(story.time)}</span>
      </div>
    </div>
  `;
}

function renderHero(main, sides) {
  const heroSection = document.getElementById("hero-section");
  const heroMain = document.getElementById("hero-main");
  const heroSide = document.getElementById("hero-side");
  
  if (!main) {
    heroSection.style.display = "none";
    return;
  }
  
  heroSection.style.display = "grid";
  const domain = getDomain(main.url);
  const mainUrl = main.url || `https://news.ycombinator.com/item?id=${main.id}`;
  
  heroMain.innerHTML = `
    <div class="rank">#1</div>
    <div class="hero-badge">🔥 Trending</div>
    <div class="title">${main.title}</div>
    <div class="domain">${domain}</div>
    <div class="meta">
      <span class="score">▲ ${main.score}</span>
      <span>💬 ${main.descendants || 0}</span>
      <span>by ${main.by}</span>
      <span>${timeAgo(main.time)}</span>
    </div>
  `;
  heroMain.onclick = () => window.open(mainUrl, "_blank");
  
  heroSide.innerHTML = sides.map((s, i) => `
    <div class="hero-side-item" onclick="window.open('${s.url || `https://news.ycombinator.com/item?id=${s.id}`}', '_blank')">
      <div class="rank">#${i + 2}</div>
      <div class="title">${s.title}</div>
      <div class="score">▲ ${s.score}</div>
    </div>
  `).join("");
}

async function fetchItem(id) {
  try {
    const res = await fetch(`${HN_BASE}/item/${id}.json`);
    return await res.json();
  } catch {
    return null;
  }
}

async function fetchStories(key, limit = 30) {
  try {
    const res = await fetch(`${HN_BASE}/${key}.json`);
    const ids = await res.json();
    const stories = await Promise.all(ids.slice(0, limit).map(fetchItem));
    return stories.filter(Boolean);
  } catch (e) {
    console.error("Fetch error:", e);
    return [];
  }
}

async function loadStories() {
  const config = VIEW_CONFIG[currentView];
  document.getElementById("section-title").textContent = config.title;
  document.getElementById("refresh-btn").classList.add("loading");
  
  showSkeleton();
  
  const stories = await fetchStories(config.key, 30);
  
  if (stories.length > 0) {
    renderHero(stories[0], stories.slice(1, 5));
    document.getElementById("news-grid").innerHTML = stories.slice(0, 9).map((s, i) => renderStory(s, i + 1)).join("");
    
    // Update stats
    document.getElementById("stat-total").textContent = stories.length;
    document.getElementById("stat-new").textContent = stories.filter(s => Date.now() / 1000 - s.time < 86400).length;
    document.getElementById("stat-users").textContent = new Set(stories.map(s => s.by)).size;
    document.getElementById("stat-comments").textContent = stories.reduce((a, s) => a + (s.descendants || 0), 0);
    
    document.getElementById("last-update").textContent = new Date().toLocaleTimeString();
  }
  
  document.getElementById("refresh-btn").classList.remove("loading");
}

// Event listeners
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentView = btn.dataset.view;
    loadStories();
  });
});

document.getElementById("refresh-btn").addEventListener("click", loadStories);

// Initial load
loadStories();
</script>
</body>
</html>
