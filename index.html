<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点日报 · Daily Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0c0c0e;
    --bg-secondary: #111114;
    --bg-card: #16161a;
    --bg-card-hover: #1c1c21;
    --bg-tag: #1a1a22;
    --accent: #e8b84b;
    --accent-dim: #b8892e;
    --text-primary: #f0ece4;
    --text-secondary: #8a8a9a;
    --text-tertiary: #55556a;
    --border: rgba(255,255,255,0.06);
    --border-accent: rgba(232,184,75,0.3);
    --score-color: #e8b84b;
    --comment-color: #6b9fff;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-accent: 0 0 40px rgba(232,184,75,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .ambient-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; pointer-events: none; z-index: 0; }
  .glow-1 { top: -200px; left: -100px; background: radial-gradient(circle, rgba(232,184,75,0.04) 0%, transparent 70%); }
  .glow-2 { bottom: -300px; right: -200px; background: radial-gradient(circle, rgba(107,159,255,0.03) 0%, transparent 70%); }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,12,14,0.88);
    backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .brand { display: flex; align-items: baseline; gap: 12px; }

  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 32px; }

  .lang-switch { display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; }
  .lang-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.5px; border: none; cursor: pointer; transition: all 0.25s ease; background: transparent; color: var(--text-tertiary); }
  .lang-btn:first-child { border-right: 1px solid var(--border); }
  .lang-btn.active { background: var(--accent); color: var(--bg-primary); }
  .lang-btn:not(.active):hover { background: var(--bg-card-hover); color: var(--text-secondary); }

  .header-meta { display: flex; align-items: center; gap: 32px; }
  .meta-item { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); }
  .meta-value { font-size: 13px; font-weight: 500; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; margin-right: 6px; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }

  /* Ticker */
  .ticker-wrap { background: linear-gradient(90deg, var(--bg-secondary) 0%, rgba(232,184,75,0.05) 50%, var(--bg-secondary) 100%); border-bottom: 1px solid var(--border); overflow: hidden; height: 36px; display: flex; align-items: center; }
  .ticker-label { flex-shrink: 0; padding: 0 20px; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); border-right: 1px solid var(--border-accent); height: 100%; display: flex; align-items: center; background: rgba(232,184,75,0.06); }
  .ticker { display: flex; align-items: center; gap: 48px; padding: 0 24px; animation: ticker-scroll 40s linear infinite; white-space: nowrap; font-size: 13px; color: var(--text-secondary); }
  .ticker:hover { animation-play-state: paused; }
  .ticker a { color: inherit; text-decoration: none; transition: color 0.2s; }
  .ticker a:hover { color: var(--text-primary); }
  .ticker-item { display: flex; align-items: center; gap: 8px; }
  .ticker-rank { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-dim); }
  @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* Main */
  main { max-width: 1400px; margin: 0 auto; padding: 48px; position: relative; z-index: 1; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .section-title::before { content: ''; display: block; width: 3px; height: 22px; background: var(--accent); border-radius: 2px; }
  .section-count { font-size: 12px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

  /* Featured - Large image cards */
  .featured-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; margin-bottom: 56px; }

  .top-story {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .top-story:hover { border-color: var(--border-accent); transform: translateY(-4px); box-shadow: var(--shadow), var(--shadow-accent); }

  .story-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    background: var(--bg-secondary);
  }

  .story-logo-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .story-logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .story-logo {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    object-fit: contain;
    background: white;
    padding: 2px;
  }

  .story-domain {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 500;
  }

  .story-rank-badge {
    width: 24px;
    height: 24px;
    background: var(--accent);
    color: var(--bg-primary);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 800;
  }

  .story-content { padding: 24px; }

  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .story-meta { display: flex; align-items: center; gap: 20px; font-size: 12px; color: var(--text-secondary); }
  .story-score { color: var(--score-color); font-weight: 600; }
  .story-comments { color: var(--comment-color); }

  /* Side stories with logos */
  .side-stories { display: flex; flex-direction: column; gap: 12px; }

  .side-story {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: stretch;
  }
  .side-story:hover { background: var(--bg-card-hover); border-color: var(--border-accent); transform: translateX(4px); }

  .side-logo-wrap {
    flex-shrink: 0;
    width: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    padding: 12px;
    background: var(--bg-secondary);
  }

  .side-logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    object-fit: contain;
    background: white;
    padding: 4px;
  }

  .side-content { flex: 1; min-width: 0; padding: 16px; }

  .side-rank-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-bottom: 4px; }

  .side-content h3 { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .side-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-tertiary); }
  .side-meta .score { color: var(--score-color); }
  .side-meta .comments { color: var(--comment-color); }

  /* Categories */
  .categories { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .cat-btn { padding: 8px 20px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .cat-btn:hover, .cat-btn.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

  .time-filter { display: flex; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 32px; width: fit-content; }
  .time-btn { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .time-btn.active { background: var(--bg-secondary); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* News grid with image cards */
  .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 64px; }

  .news-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .news-card:hover { border-color: var(--border-accent); transform: translateY(-6px); box-shadow: var(--shadow), var(--shadow-accent); }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .card-img-wrap {
    position: relative;
    height: 140px;
    overflow: hidden;
    background: var(--bg-secondary);
  }

  .card-logo-overlay {
    position: absolute;
    bottom: 10px;
    right: 10px;
    z-index: 2;
  }

  .card-logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    object-fit: contain;
    background: white;
    padding: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .card-img-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .news-card:hover .card-img-bg { transform: scale(1.04); }

  .card-inner { padding: 20px; }

  .card-rank-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-bottom: 6px; }

  .card-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; line-height: 1.45; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }

  .card-author { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }

  .card-stats { display: flex; align-items: center; gap: 12px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .stat-score { color: var(--score-color); }
  .stat-comments { color: var(--comment-color); }

  /* Gradient canvas for missing images */
  .card-canvas-wrap { position: absolute; inset: 0; }

  /* Footer */
  footer { border-top: 1px solid var(--border); padding: 32px 48px; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-left { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px; }
  .footer-left .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .footer-right { font-size: 12px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

  /* Refresh button */
  .refresh-btn { position: fixed; bottom: 32px; right: 32px; width: 52px; height: 52px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-accent); color: var(--accent); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 50; }
  .refresh-btn:hover { background: var(--accent); color: var(--bg-primary); transform: scale(1.1); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Skeleton */
  .skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Animations */
  .fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; }
  .stagger-4 { animation-delay: 0.2s; }
  .stagger-5 { animation-delay: 0.25s; }

  /* Scrollbar & selection */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
  ::selection { background: rgba(232,184,75,0.25); }

  /* Responsive */
  @media (max-width: 1100px) { .featured-grid { grid-template-columns: 1fr; } .side-stories { flex-direction: row; flex-wrap: wrap; } .side-story { flex: 1 1 300px; } .news-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 768px) { main { padding: 24px; } header { padding: 0 24px; } .card-img-wrap { height: 110px; } .story-title { font-size: 20px; } .news-grid { grid-template-columns: 1fr; } footer { padding: 24px; flex-direction: column; gap: 8px; text-align: center; } .header-meta { display: none; } .header-right { gap: 16px; } }
</style>
</head>
<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<header>
  <div class="header-top">
    <div class="brand">
      <h1>Daily Pulse</h1>
      <span id="brand-subtitle">热点日报</span>
    </div>
    <div class="header-right">
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="zh" id="lang-zh">中文</button>
        <button class="lang-btn" data-lang="en" id="lang-en">EN</button>
      </div>
      <div class="header-meta">
        <div class="meta-item">
          <span class="meta-label" data-i18="label-date">日期</span>
          <span class="meta-value" id="current-date">--</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18="label-time">北京时间</span>
          <span class="meta-value" id="current-time">--</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18="label-source">数据源</span>
          <span class="meta-value"><span class="live-dot"></span>Hacker News</span>
        </div>
      </div>
    </div>
  </div>
  <div class="ticker-wrap">
    <div class="ticker-label" data-i18="ticker-label">HOT</div>
    <div class="ticker" id="ticker"></div>
  </div>
</header>

<main>
  <div class="section-header fade-in">
    <h2 class="section-title" data-i18="section-featured">今日头条</h2>
    <span class="section-count" id="top-count" data-i18="loading">加载中...</span>
  </div>

  <div class="featured-grid" id="featured"></div>

  <div class="categories fade-in stagger-3">
    <button class="cat-btn active" data-cat="top" data-i18-btn="cat-top">🔥 热门</button>
    <button class="cat-btn" data-cat="new" data-i18-btn="cat-new">💫 最新</button>
    <button class="cat-btn" data-cat="ask" data-i18-btn="cat-ask">💬 问答</button>
    <button class="cat-btn" data-cat="show" data-i18-btn="cat-show">✨ 展示</button>
    <button class="cat-btn" data-cat="jobs" data-i18-btn="cat-jobs">💼 招聘</button>
  </div>

  <div class="time-filter fade-in stagger-4">
    <button class="time-btn active" data-time="top" data-i18-btn="time-top">热门榜</button>
    <button class="time-btn" data-time="24h" data-i18-btn="time-24h">24小时</button>
    <button class="time-btn" data-time="week" data-i18-btn="time-week">本周</button>
  </div>

  <div class="section-header fade-in stagger-5">
    <h2 class="section-title" data-i18="section-list">热门故事</h2>
    <span class="section-count" id="list-count"></span>
  </div>

  <div class="news-grid" id="news-grid"></div>
</main>

<footer>
  <div class="footer-left"><span class="dot"></span><span data-i18="footer-source">数据来源：Hacker News API · 每日自动更新</span></div>
  <div class="footer-right" id="last-updated">--</div>
</footer>

<button class="refresh-btn" id="refresh-btn" title="刷新内容" onclick="loadNews()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
  </svg>
</button>

<!-- Hidden canvas for gradient generation -->
<canvas id="gradient-canvas" width="400" height="220" style="display:none"></canvas>

<script>
// ── i18n ────────────────────────────────────────────────────────────────
const i18n = {
  zh: {
    'brand-subtitle': '热点日报', 'label-date': '日期', 'label-time': '北京时间', 'label-source': '数据源',
    'ticker-label': 'HOT', 'section-featured': '今日头条', 'section-list': '热门故事',
    'loading': '加载中...', 'cat-top': '🔥 热门', 'cat-new': '💫 最新', 'cat-ask': '💬 问答',
    'cat-show': '✨ 展示', 'cat-jobs': '💼 招聘', 'time-top': '热门榜', 'time-24h': '24小时', 'time-week': '本周',
    'footer-source': '数据来源：Hacker News API · 每日自动更新',
    'last-updated': '最后更新', 'load-fail': '加载失败，请检查网络后刷新', 'items': '条',
  },
  en: {
    'brand-subtitle': 'Daily News', 'label-date': 'Date', 'label-time': 'Local Time', 'label-source': 'Source',
    'ticker-label': 'HOT', 'section-featured': "Today's Top", 'section-list': 'Top Stories',
    'loading': 'Loading...', 'cat-top': '🔥 Top', 'cat-new': '💫 New', 'cat-ask': '💬 Ask',
    'cat-show': '✨ Show', 'cat-jobs': '💼 Jobs', 'time-top': 'Top', 'time-24h': '24 Hours', 'time-week': 'This Week',
    'footer-source': 'Powered by Hacker News API · Auto-updated daily',
    'last-updated': 'Updated', 'load-fail': 'Failed to load. Check your connection and refresh.', 'items': ' items',
  }
};

let currentLang = localStorage.getItem('dailypulse-lang') || 'zh';

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('dailypulse-lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
  document.querySelectorAll('[data-i18]').forEach(el => { const k = el.getAttribute('data-i18'); if (i18n[lang][k]) el.textContent = i18n[lang][k]; });
  document.querySelectorAll('[data-i18-btn]').forEach(btn => { const k = btn.getAttribute('data-i18-btn'); if (i18n[lang][k]) btn.innerHTML = i18n[lang][k]; });
  if (filteredStories.length) { renderFeatured(); renderGrid(); renderTicker(); }
  updateDateTime();
}
function t(key) { return i18n[currentLang][key] || i18n['zh'][key] || key; }

// ── Image helpers ──────────────────────────────────────────────────────
const LOGO_CACHE = {};

function getDomain(url) {
  if (!url) return null;
  try { return new URL(url).hostname.replace('www.', ''); } catch { return null; }
}

function getLogoUrl(domain) {
  if (!domain) return null;
  if (LOGO_CACHE[domain]) return LOGO_CACHE[domain];
  const url = `https://logo.clearbit.com/https://${domain}`;
  LOGO_CACHE[domain] = url;
  return url;
}

// Generate a deterministic gradient from domain name
const GRADIENT_COLORS = {
  google: ['#4285f4','#34a853'], openai: ['#10a37f','#0d7a5f'], github: ['#24292e','#1a1e24'],
  microsoft: ['#00a4ef','#7fba00'], amazon: ['#ff9900','#ff6600'], apple: ['#555555','#333333'],
  meta: ['#0668e1','#0081fb'], nvidia: ['#76b900','#4c8c2a'], tesla: ['#cc0000','#8b0000'],
  adobe: ['#ff0000','#cc0000'], ibm: ['#0530ad','#0047bb'], intel: ['#0071c5','#00487a'],
  spotify: ['#1db954','#169c58'], netflix: ['#e50914','#b20710'], twitter: ['#1da1f2','#0d8ecf'],
  reddit: ['#ff4500','#cc3700'], youtube: ['#ff0000','#cc0000'], wikipedia: ['#000000','#333333'],
};

function getGradientStyle(domain) {
  const colors = GRADIENT_COLORS[domain] || ['#1a1a2e', '#16213e'];
  const c1 = colors[0], c2 = colors[1];
  return `background: linear-gradient(135deg, ${c1}22 0%, ${c2}33 100%);`;
}

function makeGradientDataURL(domain, width, height) {
  const canvas = document.getElementById('gradient-canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  const colors = GRADIENT_COLORS[domain] || ['#1a1a2e', '#16213e'];
  const grad = ctx.createLinearGradient(0, 0, width, height);
  grad.addColorStop(0, colors[0] + '30');
  grad.addColorStop(1, colors[1] + '50');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);
  // Add subtle pattern
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  for (let i = 0; i < width; i += 20) {
    for (let j = 0; j < height; j += 20) {
      if ((i + j) % 40 === 0) ctx.fillRect(i, j, 10, 10);
    }
  }
  return canvas.toDataURL();
}

// ── News logic ─────────────────────────────────────────────────────────
const HN_API = 'https://hacker-news.firebaseio.com/v0';
let allStories = [];
let filteredStories = [];
let currentFilter = 'top';
let currentTimeFilter = 'top';

function formatNumber(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n; }

function formatTimeAgo(timestamp) {
  const diff = Date.now() / 1000 - timestamp;
  if (diff < 60) return Math.floor(diff) + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

function updateDateTime() {
  const now = new Date();
  const dateFmt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('current-date').textContent = now.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', dateFmt);
  document.getElementById('current-time').textContent = now.toLocaleTimeString(currentLang === 'zh' ? 'zh-CN' : 'en-US', { hour: '2-digit', minute: '2-digit' }) + (currentLang === 'zh' ? ' CST' : '');
}

async function fetchStories(ids) {
  const promises = ids.slice(0, 30).map(id =>    fetch(`${HN_API}/item/${id}.json`).then(r => r.json()).catch(() => null)
  );
  return Promise.all(promises);
}

async function loadNews() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const featured = document.getElementById('featured');
  const grid = document.getElementById('news-grid');
  featured.innerHTML = Array(4).fill().map(() => '<div class="top-story skeleton" style="min-height:380px"></div>').join('');
  grid.innerHTML = Array(9).fill().map(() => '<div class="news-card skeleton" style="height:280px"></div>').join('');

  try {
    let ids;
    switch (currentFilter) {
      case 'new': ids = await fetch(`${HN_API}/newstories.json`).then(r => r.json()); break;
      case 'ask': ids = await fetch(`${HN_API}/askstories.json`).then(r => r.json()); break;
      case 'show': ids = await fetch(`${HN_API}/showstories.json`).then(r => r.json()); break;
      case 'jobs': ids = await fetch(`${HN_API}/jobstories.json`).then(r => r.json()); break;
      default: ids = await fetch(`${HN_API}/topstories.json`).then(r => r.json());
    }
    allStories = (await fetchStories(ids)).filter(s => s && s.title);
    applyTimeFilter();
    renderTicker();
    document.getElementById('last-updated').textContent = t('last-updated') + ': ' + new Date().toLocaleTimeString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
  } catch (e) {
    featured.innerHTML = `<p style="color:var(--text-secondary);padding:40px;text-align:center;grid-column:1/-1">${t('load-fail')}</p>`;
    grid.innerHTML = '';
  }
  btn.classList.remove('spinning');
}

function applyTimeFilter() {
  const now = Date.now() / 1000;
  const cutoff = currentTimeFilter === '24h' ? now - 86400 : currentTimeFilter === 'week' ? now - 604800 : 0;
  filteredStories = allStories.filter(s => !s.time || s.time >= cutoff);
  renderFeatured();
  renderGrid();
}

function renderTicker() {
  const ticker = document.getElementById('ticker');
  const items = filteredStories.slice(0, 15);
  const doubled = [...items, ...items];
  ticker.innerHTML = doubled.map((s, i) =>
    `<span class="ticker-item"><span class="ticker-rank">${String(i % items.length + 1).padStart(2, '0')}</span><a href="${s.url || `https://news.ycombinator.com/item?id=${s.id}`}" target="_blank" rel="noopener">${s.title}</a></span>`
  ).join('');
}

function makeLogoHTML(domain, size) {
  if (!domain) return '';
  const logoUrl = getLogoUrl(domain);
  return `<img class="${size === 'large' ? 'story-logo' : size === 'card' ? 'card-logo' : 'side-logo'}"
    src="${logoUrl}"
    alt="${domain}"
    onerror="this.style.display='none'"
    loading="lazy">`;
}

function makeCardBg(domain) {
  if (!domain) return '';
  const gradDataURL = makeGradientDataURL(domain, 400, 220);
  return `background: linear-gradient(160deg, ${gradDataURL ? 'url(' + gradDataURL + ')' : ''} 0%, transparent 60%), linear-gradient(135deg, #1a1a2e22 0%, #16213e33 100%); background-size: cover;`;
}

function renderFeatured() {
  const featured = document.getElementById('featured');
  const top = filteredStories.slice(0, 4);
  const sides = filteredStories.slice(4, 8);
  document.getElementById('top-count').textContent = top.length + t('items');

  const topHTML = top[0] ? (() => {
    const domain = getDomain(top[0].url);
    const gradBg = makeGradientDataURL(domain, 800, 220);
    const logoHTML = makeLogoHTML(domain, 'large');
    return `
    <div class="top-story" style="opacity:1;animation:none" onclick="window.open('${top[0].url || `https://news.ycombinator.com/item?id=${top[0].id}`}', '_blank')">
      <img class="story-image" src="${gradBg}" style="object-fit:cover" alt="" onerror="this.style.display='none'">
      ${logoHTML ? `<div style="position:absolute;top:16px;left:16px;z-index:2">${logoHTML}</div>` : ''}
      <div class="story-logo-bar">
        <div class="story-logo-wrap">
          ${logoHTML || `<span style="width:20px;height:20px;background:var(--accent);border-radius:4px;display:inline-block"></span>`}
          <span class="story-domain">${domain || 'news.ycombinator.com'}</span>
        </div>
        <div class="story-rank-badge">1</div>
      </div>
      <div class="story-content">
        <div class="story-title">${top[0].title}</div>
        <div class="story-meta">
          <span class="story-score">&#9650; ${formatNumber(top[0].score || 0)}</span>
          <span class="story-comments">&#128172; ${formatNumber(top[0].descendants || 0)}</span>
          <span>&#128100; ${top[0].by}</span>
          <span>&#9201; ${formatTimeAgo(top[0].time)}</span>
        </div>
      </div>
    </div>`;
  })() : '';

  const sidesHTML = `
    <div class="side-stories">
      ${sides.map((s, i) => {
        const domain = getDomain(s.url);
        const logoHTML = makeLogoHTML(domain, 'side');
        return `
        <div class="side-story" style="opacity:1;animation:none" onclick="window.open('${s.url || `https://news.ycombinator.com/item?id=${s.id}`}', '_blank')">
          <div class="side-logo-wrap" style="${makeGradientDataURL(domain, 64, 80)}">
            <img class="side-logo" src="${getLogoUrl(domain)}" alt="${domain}" onerror="this.style.opacity='0'">
          </div>
          <div class="side-content">
            <div class="side-rank-num">#${i + 2}</div>
            <h3>${s.title}</h3>
            <div class="side-meta">
              <span class="score">&#9650; ${formatNumber(s.score || 0)}</span>
              <span class="comments">&#128172; ${formatNumber(s.descendants || 0)}</span>
              <span>&#9201; ${formatTimeAgo(s.time)}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  featured.innerHTML = topHTML + sidesHTML;
}

function renderGrid() {
  const grid = document.getElementById('news-grid');
  const cards = filteredStories.slice(8, 20);
  document.getElementById('list-count').textContent = cards.length + t('items');

  grid.innerHTML = cards.map((s, i) => {
    const domain = getDomain(s.url);
    const logoHTML = makeLogoHTML(domain, 'card');
    const gradBg = makeGradientDataURL(domain, 400, 140);
    return `
    <div class="news-card" style="animation-delay:${i * 0.06}s" onclick="window.open('${s.url || `https://news.ycombinator.com/item?id=${s.id}`}', '_blank')">
      <div class="card-img-wrap" style="background: linear-gradient(135deg, #1a1a2e33 0%, #16213e44 100%);">
        <div style="position:absolute;inset:0;${makeGradientDataURL(domain, 400, 140)};background-size:cover;opacity:0.7"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(to top, var(--bg-card) 0%, transparent 60%)"></div>
        <div class="card-logo-overlay">${logoHTML}</div>
      </div>
      <div class="card-inner">
        <div class="card-rank-num">#${i + 9} · ${domain || 'hn'}</div>
        <div class="card-title">${s.title}</div>
        <div class="card-footer">
          <span class="card-author">&#128100; ${s.by}</span>
          <div class="card-stats">
            <span class="stat-score">&#9650; ${formatNumber(s.score || 0)}</span>
            <span class="stat-comments">&#128172; ${formatNumber(s.descendants || 0)}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Event listeners
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    loadNews();
  });
});

document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTimeFilter = btn.dataset.time;
    applyTimeFilter();
    renderTicker();
  });
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
});

// Init
setLanguage(currentLang);
updateDateTime();
setInterval(updateDateTime, 30000);
loadNews();
</script>
</body>
