<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Pulse · 热点日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--bg2:#111114;--card:#16161a;--card-h:#1c1c21;--accent:#e8b84b;--accent-bg:rgba(232,184,75,.07);--txt:#f0ece4;--txt2:#8a8a9a;--txt3:#55556a;--border:rgba(255,255,255,.06);--border-a:rgba(232,184,75,.3);--score:#e8b84b;--cmt:#6b9fff;--shad:0 4px 24px rgba(0,0,0,.4);--shad-a:0 0 40px rgba(232,184,75,.08);--r8:8px;--r14:14px;--r18:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
.glow{position:fixed;width:700px;height:700px;border-radius:50%;pointer-events:none;z-index:0}
.g1{top:-250px;left:-150px;background:radial-gradient(circle,rgba(232,184,75,.04) 0%,transparent 70%)}
.g2{bottom:-350px;right:-250px;background:radial-gradient(circle,rgba(107,159,255,.03) 0%,transparent 70%)}
header{position:sticky;top:0;z-index:100;background:rgba(12,12,14,.9);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border)}
.hdr{max-width:1400px;margin:0 auto;padding:14px 48px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--txt) 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand span{font-size:11px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.hdr-r{display:flex;align-items:center;gap:24px}
.live-chip{display:flex;align-items:center;gap:6px;background:var(--accent-bg);border:1px solid var(--border-a);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--accent);font-weight:600}
.live-chip::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hdr-time{font-size:12px;color:var(--txt3);font-family:'JetBrains Mono',monospace;text-align:right}
.hdr-time .date{color:var(--txt2)}
.ls{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lb{padding:5px 13px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--txt3);font-family:'Space Grotesk',sans-serif}
.lb:first-child{border-right:1px solid var(--border)}
.lb.active{background:var(--accent);color:var(--bg)}
.lb:not(.active):hover{background:var(--card-h);color:var(--txt2)}
.hero{max-width:1400px;margin:0 auto;padding:48px 48px 32px;position:relative;z-index:1}
.hero-lbl{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.hero-lbl::before{content:'';display:block;width:20px;height:2px;background:var(--accent)}
.hero-grid{display:grid;grid-template-columns:1fr 400px;gap:20px}
.hero-main{position:relative;border-radius:var(--r18);overflow:hidden;cursor:pointer;transition:all .4s ease;border:1px solid var(--border);background:var(--card);min-height:360px}
.hero-main:hover{border-color:var(--border-a);transform:translateY(-3px);box-shadow:var(--shad),var(--shad-a)}
.hero-bg{position:absolute;inset:0}
.hero-c{position:relative;z-index:2;padding:36px;height:100%;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(to top,rgba(12,12,14,.95) 0%,rgba(12,12,14,.4) 50%,transparent 100%)}
.hero-num{font-family:'Playfair Display',serif;font-size:72px;font-weight:800;color:rgba(232,184,75,.15);line-height:1;position:absolute;top:20px;right:28px}
.hero-src{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.hero-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 6px}
.hero-chip img{width:20px;height:20px;border-radius:4px;object-fit:contain;background:#fff;padding:2px}
.hero-chip-nm{font-size:11px;color:var(--txt2);font-weight:500}
.hero-badge{background:var(--accent);color:var(--bg);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:6px}
.hero-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.3;margin-bottom:18px;letter-spacing:-.3px}
.hero-meta{display:flex;align-items:center;gap:18px;font-size:12px;color:var(--txt2)}
.hero-score{color:var(--score);font-weight:600}
.hero-comments{color:var(--cmt)}
.hero-author{color:var(--txt3)}
.hero-side{display:flex;flex-direction:column;gap:12px}
.hero-si{flex:1;display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r14);padding:16px 18px;cursor:pointer;transition:all .3s ease;overflow:hidden}
.hero-si:hover{background:var(--card-h);border-color:var(--border-a);transform:translateX(3px)}
.hero-si-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:var(--txt3);flex-shrink:0;width:36px;line-height:1}
.hero-si-logo{width:36px;height:36px;border-radius:8px;object-fit:contain;background:#fff;padding:4px;flex-shrink:0}
.hero-si-ph{width:36px;height:36px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.hero-si-info{flex:1;min-width:0}
.hero-si-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.hero-si-meta{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:10px}
.hero-si-score{color:var(--score);font-family:'JetBrains Mono',monospace}
.hero-si-cmts{color:var(--cmt);font-family:'JetBrains Mono',monospace}
.cat-sec{max-width:1400px;margin:0 auto;padding:0 48px 48px;position:relative;z-index:1}
.cat-tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:5px;margin-bottom:24px;width:fit-content;flex-wrap:wrap}
.cat-tab{display:flex;align-items:center;gap:6px;padding:8px 20px;border-radius:8px;border:none;background:transparent;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;transition:all .25s ease;white-space:nowrap;font-family:'Space Grotesk',sans-serif}
.cat-tab:hover{color:var(--txt);background:var(--card-h)}
.cat-tab.active{background:var(--bg2);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.cat-row{margin-bottom:36px}
.cat-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.cat-row-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.cat-row-title::before{content:'';display:block;width:3px;height:18px;background:var(--accent);border-radius:2px}
.cat-row-count{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;margin-left:6px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.strip-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r14);overflow:hidden;cursor:pointer;transition:all .3s ease;opacity:0;animation:fu .4s ease forwards}
.strip-card:hover{border-color:var(--border-a);transform:translateY(-4px);box-shadow:var(--shad)}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.strip-img{position:relative;height:120px;overflow:hidden}
.strip-bg{position:absolute;inset:0}
.strip-logo{position:absolute;bottom:8px;right:8px;z-index:2}
.strip-logo img{width:28px;height:28px;border-radius:6px;object-fit:contain;background:#fff;padding:3px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.strip-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px}
.strip-body{padding:14px}
.strip-source{font-size:10px;color:var(--txt3);margin-bottom:6px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.strip-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.strip-author{font-size:10px;color:var(--txt3)}
.strip-stats{display:flex;gap:10px;font-size:10px;font-family:'JetBrains Mono',monospace}
.strip-score{color:var(--score)}
.strip-cmts{color:var(--cmt)}
.tf-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.tf{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px}
.tb{padding:5px 14px;border-radius:5px;border:none;background:transparent;color:var(--txt2);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.tb.active{background:var(--bg2);color:var(--txt);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.ref-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--txt2);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.ref-btn:hover{border-color:var(--border-a);color:var(--accent)}
.ref-btn svg{transition:transform .3s}
.ref-btn:hover svg{transform:rotate(180deg)}
footer{border-top:1px solid var(--border);padding:28px 48px;max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.ft-l{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:8px}
.ft-l .dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.ft-r{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace}
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card-h) 50%,var(--card) 75%);background-size:200% 100%;animation:shim 1.5s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:1100px){.hero-grid{grid-template-columns:1fr}.hero-side{flex-direction:row;flex-wrap:wrap}.hero-si{flex:1 1 200px}.cat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.hdr{padding:12px 20px}.hero{padding:24px 20px 20px}.hero-title{font-size:22px}.hero-num{font-size:48px}.cat-sec{padding:0 20px 32px}.cat-grid{grid-template-columns:1fr 1fr}.cat-tabs{flex-wrap:wrap}footer{padding:20px;flex-direction:column;gap:8px;text-align:center}.hdr-time{display:none}}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>
<header>
<div class="hdr">
  <div class="brand"><h1>Daily Pulse</h1><span id="brand-sub">热点日报</span></div>
  <div class="hdr-r">
    <div class="live-chip" id="live-chip">直播更新</div>
    <div class="hdr-time"><div class="date" id="h-date">--</div><div id="h-time">--</div></div>
    <div class="ls">
      <button class="lb active" data-lang="zh">中文</button>
      <button class="lb" data-lang="en">EN</button>
    </div>
  </div>
</div>
</header>
<section class="hero">
  <div class="hero-lbl" id="hero-lbl">▲ 今日最热</div>
  <div class="hero-grid">
    <div class="hero-main" id="hero-main"></div>
    <div class="hero-side" id="hero-side"></div>
  </div>
</section>
<section class="cat-sec">
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="tf-row">
    <div class="tf">
      <button class="tb active" data-time="top" id="tf-top">热门榜</button>
      <button class="tb" data-time="24h" id="tf-24h">24小时</button>
      <button class="tb" data-time="week" id="tf-week">本周</button>
    </div>
    <button class="ref-btn" id="refresh-btn" onclick="loadAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      <span id="refresh-txt">刷新</span>
    </button>
  </div>
  <div id="category-strips"></div>
</section>
<footer>
  <div class="ft-l"><span class="dot"></span><span id="footer-src">数据来源：Hacker News API</span></div>
  <div class="ft-r" id="last-upd">--</div>
</footer>
<canvas id="gc" width="400" height="220" style="display:none"></canvas>
<script>
var I={zh:{"brand-sub":"热点日报","live-chip":"直播更新","hero-lbl":"▲ 今日最热","cat-top":"🔥 热门","cat-new":"💫 最新","cat-ask":"💬 问答","cat-show":"✨ 展示","cat-jobs":"💼 招聘","tf-top":"热门榜","tf-24h":"24小时","tf-week":"本周","refresh-txt":"刷新","footer-src":"数据来源：Hacker News API","last-upd":"最后更新","items":"条","fail":"加载失败，请检查网络后刷新"},en:{"brand-sub":"Daily News","live-chip":"LIVE","hero-lbl":"▲ TODAY'S TOP","cat-top":"🔥 Top","cat-new":"💫 New","cat-ask":"💬 Ask","cat-show":"✨ Show","cat-jobs":"💼 Jobs","tf-top":"Top","tf-24h":"24h","tf-week":"Week","refresh-txt":"Refresh","footer-src":"Powered by Hacker News API","last-upd":"Updated","items":" items","fail":"Failed to load. Check connection."}};
var LANG=localStorage.getItem("dp-lang")||"zh";
function t(k){return I[LANG][k]||I.zh[k]||k}
function setLang(l){LANG=l;localStorage.setItem("dp-lang",l);document.querySelectorAll(".lb").forEach(function(b){b.classList.toggle("active",b.dataset.lang===l)});var ids=["brand-sub","live-chip","hero-lbl","refresh-txt","footer-src","tf-top","tf-24h","tf-week"];ids.forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=t(id)}});if(allByCat.technology&&allByCat.technology.length)renderAll();updateClock()}
function updateClock(){var n=new Date();document.getElementById("h-date").textContent=n.toLocaleDateString(LANG==="zh"?"zh-CN":"en-US",{weekday:"short",month:"short",day:"numeric"});document.getElementById("h-time").textContent=n.toLocaleTimeString(LANG==="zh"?"zh-CN":"en-US",{hour:"2-digit",minute:"2-digit"})+(LANG==="zh"?" CST":"")}
var LC={};
var GRAD={google:"#4285f4",openai:"#10a37f",github:"#24292e",microsoft:"#00a4ef",amazon:"#ff9900",apple:"#555",meta:"#0668e1",nvidia:"#76b900",tesla:"#e82127",spotify:"#1db954",netflix:"#e50914",twitter:"#1da1f2",reddit:"#ff4500",youtube:"#ff0000",ycombinator:"#ff6600",stripe:"#635bff",vercel:"#000",aws:"#ff9900",cloudflare:"#f38020",linear:"#5e6ad2",figma:"#f24e1e",notion:"#000",shopify:"#96bf48",tailwindcss:"#06b6d4",react:"#61dafb",typescript:"#3178c6",python:"#3776ab",mozilla:"#ff7139",archlinux:"#1793d1",debian:"#a80030",ubuntu:"#e95420",fedora:"#51a2da",golang:"#00add8",rust:"#ce422b",java:"#007396",stackoverflow:"#f48024",medium:"#00ab6c",techcrunch:"#0a9b4e",theverge:"#ec1c24",arstechnica:"#ff4e00",engadget:"#00bfff",mashable:"#45b8ac",bloomberg:"#000",nytimes:"#000",wsj:"#000",forbes:"#04040c",reuters:"#ff8000",bbc:"#bb1919",cnn:"#cc0000",ft:"#cc0000",economist:"#e3120b",hbr:"#c5203e"};
function getDomain(url){if(!url)return null;try{return new URL(url).hostname.replace("www.","")}catch(e){return null}}
function getLogo(domain){if(!domain)return null;if(!LC[domain])LC[domain]="https://logo.clearbit.com/https://"+domain;return LC[domain]}
function gradDU(domain,w,h){var c=document.getElementById("gc");c.width=w;c.height=h;var ctx=c.getContext("2d");var col=GRAD[domain]||"#1a1a2e";var g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,col+"18");g.addColorStop(1,col+"40");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="rgba(255,255,255,.012)";for(var i=0;i<w;i+=20)for(var j=0;j<h;j+=20)if((i+j)%40===0)ctx.fillRect(i,j,8,8);return c.toDataURL()}
function logoImgLg(domain){var u=getLogo(domain);if(!u)return'<div class="hero-si-ph">📰</div>';return'<img class="hero-si-logo" src="'+u+'" alt="'+domain+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><div class="hero-si-ph" style="display:none">📰</div>'}
function logoImgSm(domain){var u=getLogo(domain);if(!u)return'<div style="width:20px;height:20px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">📰</div>';return'<img style="width:20px;height:20px;border-radius:4px;object-fit:contain;background:#fff;padding:2px;flex-shrink:0" src="'+u+'" alt="'+domain+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><div style="width:20px;height:20px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);display:none;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">📰</div>'}
function logoImgXs(domain){var u=getLogo(domain);if(!u)return'<div style="width:28px;height:28px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px">📰</div>';return'<img style="width:28px;height:28px;border-radius:6px;object-fit:contain;background:#fff;padding:3px" src="'+u+'" alt="'+domain+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><div style="width:28px;height:28px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:none;align-items:center;justify-content:center;font-size:12px">📰</div>'}
function num(n){return n>=1000?(n/1000).toFixed(1)+"k":n}
function timeAgo(ts){var d=Date.now()/1000-ts;if(d<60)return Math.floor(d)+"s";if(d<3600)return Math.floor(d/60)+"m";if(d<86400)return Math.floor(d/3600)+"h";return Math.floor(d/86400)+"d"}
var HN="https://hacker-news.firebaseio.com/v0";
var CAT_DEF=[{id:"top",key:"technology",icon:"🔥",label:"热门"},{id:"new",key:"newest",icon:"💫",label:"最新"},{id:"ask",key:"ask_hn",icon:"💬",label:"问答"},{id:"show",key:"show_hn",icon:"✨",label:"展示"},{id:"jobs",key:"jobs",icon:"💼",label:"招聘"}];
var allByCat={},timeFilter="top",storiesShown={};
async function fetcher(ids){var rs=await Promise.all(ids.slice(0,30).map(function(id){return fetch(HN+"/item/"+id+".json").then(function(r){return r.json()}).catch(function(){return null})}));return rs.filter(Boolean)}
async function loadAll(){var btn=document.getElementById("refresh-btn");btn.disabled=true;showSkeleton();try{var top=await fetch(HN+"/topstories.json").then(function(r){return r.json()});var nw=await fetch(HN+"/newstories.json").then(function(r){return r.json()});var ask=await fetch(HN+"/askstories.json").then(function(r){return r.json()});var sh=await fetch(HN+"/showstories.json").then(function(r){return r.json()});var jb=await fetch(HN+"/jobstories.json").then(function(r){return r.json()});var r=await Promise.all([fetcher(top),fetcher(nw),fetcher(ask),fetcher(sh),fetcher(jb)]);allByCat={technology:r[0],newest:r[1],ask_hn:r[2],show_hn:r[3],jobs:r[4]};storiesShown={};CAT_DEF.forEach(function(c){storiesShown[c.id]=filtered(c.key)});renderAll();document.getElementById("last-upd").textContent=t("last-upd")+": "+new Date().toLocaleTimeString(LANG==="zh"?"zh-CN":"en-US")}catch(e){console.error(e)}btn.disabled=false}
function cutoff(){var now=Date.now()/1000;return timeFilter==="24h"?now-86400:timeFilter==="week"?now-604800:0}
function filtered(key){var c=cutoff();return(allByCat[key]||[]).filter(function(s){return!s.time||s.time>=c})}
function showSkeleton(){document.getElementById("hero-main").innerHTML='<div class="sk" style="width:100%;height:100%;border-radius:var(--r18)"></div>';document.getElementById("hero-side").innerHTML=Array(4).fill().map(function(){return'<div class="sk" style="height:78px;border-radius:var(--r14)"></div>'}).join("");document.getElementById("category-strips").innerHTML=CAT_DEF.map(function(c){return'<div class="cat-row" id="cat-row-'+c.id+'"><div class="cat-row-hdr"><div class="cat-row-title" style="color:var(--txt3)">'+c.icon+" "+c.label+'</div></div><div class="cat-grid">'+Array(4).fill().map(function(){return'<div class="sk" style="height:220px"></div>'}).join("")+"</div></div>"}).join("")}
function renderAll(){CAT_DEF.forEach(function(c){storiesShown[c.id]=filtered(c.key)});renderHero();renderTabs();renderStrips()}
function renderHero(){var all=storiesShown.top||[];var main=all[0],sides=all.slice(1,5);var hm=document.getElementById("hero-main");if(!main){hm.innerHTML='<p style="color:var(--txt2);padding:40px">'+t("fail")+"</p>";return}var domain=getDomain(main.url);var bg=gradDU(domain,900,400);var mainUrl=main.url||"https://news.ycombinator.com/item?id="+main.id;hm.innerHTML='<div class="hero-bg" style="background:url('+bg+') center/cover"></div><div class="hero-c"><div class="hero-num">#1</div><div class="hero-src"><div class="hero-chip">'+logoImgSm(domain)+'<span class="hero-chip-nm">'+(domain||"news.ycombinator.com")+'</span></div><div class="hero-badge">🔥 热门</div></div><div class="hero-title">'+main.title+'</div><div class="hero-meta"><span class="hero-score">▲ '+num(main.score||0)+'</span><span class="hero-comments">💬 '+num(main.descendants||0)+'</span><span class="hero-author">👤 '+main.by+'</span><span>⏱ '+timeAgo(main.time)+"</span></div></div>";hm.style.cursor="pointer";hm.setAttribute("data-url",mainUrl);hm.onclick=function(){window.open(this.getAttribute("data-url"),"_blank")};document.getElementById("hero-side").innerHTML=sides.map(function(s,i){var d=getDomain(s.url);var url=s.url||"https://news.ycombinator.com/item?id="+s.id;return'<div class="hero-si" data-url="'+url.replace(/"/g,"&quot;")+'"><div class="hero-si-num">#'+(i+2)+"</div>"+logoImgLg(d)+'<div class="hero-si-info"><div class="hero-si-title">'+s.title+'</div><div class="hero-si-meta"><span class="hero-si-score">▲ '+num(s.score||0)+'</span><span class="hero-si-cmts">💬 '+num(s.descendants||0)+'</span><span>⏱ '+timeAgo(s.time)+"</span></div></div></div>"}).join("");document.querySelectorAll(".hero-si").forEach(function(el){el.onclick=function(){window.open(this.getAttribute("data-url"),"_blank")}})}}
function renderTabs(){var tabs=document.getElementById("cat-tabs");tabs.innerHTML=CAT_DEF.map(function(c){return'<button class="cat-tab'+(c.id==="top"?" active":"")+'" data-cat="'+c.id+'">'+c.icon+' <span>'+c.label+'</span> <span style="font-size:10px;color:var(--txt3);font-family:\'JetBrains Mono\',monospace">('+Math.min((storiesShown[c.id]||[]).length,20)+")</span></button>"}).join("");tabs.querySelectorAll(".cat-tab").forEach(function(btn){btn.onclick=function(){tabs.querySelectorAll(".cat-tab").forEach(function(b){b.classList.remove("active")});btn.classList.add("active");var catId=btn.dataset.cat;var row=document.getElementById("cat-row-"+catId);if(row)row.scrollIntoView({behavior:"smooth",block:"start"})}})}
function renderStrips(){CAT_DEF.forEach(function(c){var row=document.getElementById("cat-row-"+c.id);if(!row){row=document.createElement("div");row.className="cat-row";row.id="cat-row-"+c.id;document.getElementById("category-strips").appendChild(row)}var stories=storiesShown[c.id]||[];row.innerHTML='<div class="cat-row-hdr"><div class="cat-row-title">'+c.icon+" <span>"+c.label+'</span><span class="cat-row-count">'+stories.length+t("items")+'</span></div></div><div class="cat-grid">'+stories.slice(0,8).map(function(s,i){var d=getDomain(s.url);var bg=gradDU(d,400,120);var url=s.url||"https://news.ycombinator.com/item?id="+s.id;return'<div class="strip-card" style="animation-delay:'+(i*0.06)+'s" data-url="'+url.replace(/"/g,"&quot;")+'"><div class="strip-img"><div class="strip-bg" style="background:url('+bg+') center/cover"></div><div class="strip-logo">'+logoImgXs(d)+"</div></div><div class=\"strip-body\"><div class=\"strip-source\">"+(d||"news.ycombinator.com")+'</div><div class="strip-title">'+s.title+'</div><div class="strip-footer"><span class="strip-author">👤 '+s.by+'</span><div class="strip-stats"><span class="strip-score">▲ '+num(s.score||0)+'</span><span class="strip-cmts">💬 '+num(s.descendants||0)+"</span></div></div></div></div>"}).join("")+"</div>"});document.querySelectorAll(".strip-card").forEach(function(el){el.onclick=function(){window.open(this.getAttribute("data-url"),"_blank")}})}}
document.querySelectorAll(".lb").forEach(function(b){b.onclick=function(){setLang(b.dataset.lang)}});
document.querySelectorAll(".tb").forEach(function(btn){btn.onclick=function(){document.querySelectorAll(".tb").forEach(function(b){b.classList.remove("active")});btn.classList.add("active");timeFilter=btn.dataset.time;if(Object.keys(storiesShown).length)renderAll()}});
setLang(LANG);updateClock();setInterval(updateClock,30000);loadAll();
